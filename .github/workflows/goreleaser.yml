name: GoReleaser

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: build --snapshot --clean

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: shed-sidecar-binaries
          path: dist/
